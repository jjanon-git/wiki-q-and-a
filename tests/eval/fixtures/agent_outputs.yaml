# Canned AgentResult outputs for the dev placeholder cases, keyed by
# question text. Used by src/wiki_qa/agent_stub.py to drive the runner
# end-to-end without API calls.
#
# Format reflects the system prompt v1 output structure:
# - evidence: parsed <evidence> block content (quoted passages from
#   cited articles)
# - answer:   parsed <answer> block content (prose, with bracket-only
#   inline citations and a Title - URL plain-text Sources section)
# - raw_output: full model text before parsing (omit to auto-construct
#   from <evidence>...</evidence>\n<answer>...</answer>)
#
# Outputs are deliberately healthy (all behavior checks should pass)
# so the runner has a green baseline.

- question: "When was the Battle of Hastings?"
  evidence: |
    [Battle of Hastings] - "The Battle of Hastings was fought on 14 October 1066 between the Norman-French army of William, Duke of Normandy, and an English army under King Harold Godwinson."
  answer: |
    The Battle of Hastings was fought on 14 October 1066, between the
    Norman-French army of William, Duke of Normandy, and an English
    army under King Harold Godwinson, per [Battle of Hastings].

    Sources:
    Battle of Hastings - https://en.wikipedia.org/wiki/Battle_of_Hastings
  tool_calls:
    - query: "Battle of Hastings 1066"
      raw_result_str: |
        <search_results query="Battle of Hastings 1066" count="1">
        <result index="1">
        <title>Battle of Hastings</title>
        <url>https://en.wikipedia.org/wiki/Battle_of_Hastings</url>
        <extract>The Battle of Hastings was fought on 14 October 1066...</extract>
        </result>
        </search_results>
      latency_ms: 240
  stop_reason: end_turn
  usage:
    input_tokens: 1200
    output_tokens: 90
    cache_read_tokens: 0
    cache_creation_tokens: 0

- question: "What is 17 multiplied by 23?"
