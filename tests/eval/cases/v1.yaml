  expected_behavior:
    must_search: true
    must_not_search: false
    must_surface_premise_discrepancy: false
    must_refuse: false
  notes: "Verified against live Wikipedia. 'Capital of Australia' returns the Canberra article. Tests resilience to common misconception (Sydney/Melbourne)."

- id: simple_factual_004
  category: simple_factual
  difficulty: easy
  question: "In what years was World War II fought?"
  expected_answer: |
    Per Wikipedia (World War II article lead): "World War II, or the
    Second World War (1 September 1939 – 2 September 1945), was a global
    conflict..." A correct response identifies 1939–1945. Off by more than
    a year on either end is a factual_accuracy failure.
  expected_behavior:
    must_search: true
    must_not_search: false
    must_surface_premise_discrepancy: false
    must_refuse: false
  notes: "Verified against live Wikipedia (World War II article lead)."

# ---------------------------------------------------------------------------
# multi_source (3) — parallel info gathering from two articles, then combine.
# ---------------------------------------------------------------------------

- id: multi_source_001
  category: multi_source
  difficulty: medium
  question: "Who lived longer: Charles Darwin or Isaac Newton?"
  expected_answer: |
    Per Wikipedia: Charles Darwin lived 1809–1882 (73 years). Isaac Newton
    lived 1643–1727 (84 years; using the New Style/Gregorian calendar; or
    1642–1727 in Old Style). The Newton article lead gives both calendar
    versions: "4 January [O.S. 25 December] 1643 – 31 March [O.S. 20 March]
    1727".

    A correct response identifies Newton as longer-lived (~84 vs 73 years).
    Naming Darwin is a factual_accuracy failure. Approximate ages are
    fine; the agent does not need to recite exact dates — only the
    comparison conclusion needs to be correct.
  expected_behavior:
    must_search: true
    must_not_search: false
    must_surface_premise_discrepancy: false
    must_refuse: false
  notes: "Verified against live Wikipedia (Charles Darwin and Isaac Newton article leads). Tests parallel info gathering and arithmetic comparison."

- id: multi_source_002
  category: multi_source
  difficulty: medium
  question: "Which is taller, K2 or Kangchenjunga?"
  expected_answer: |
    Per Wikipedia: K2 stands at 8,611 metres (the second-highest mountain
    on Earth, per the K2 article lead). Kangchenjunga stands at 8,586
    metres (the third-highest, per the Kangchenjunga article lead). K2
    is therefore taller — by 25 metres.

    A correct response identifies K2 as taller. Naming Kangchenjunga is a
    factual_accuracy failure. Either citing the heights or the ranking
    (second vs third highest) is sufficient grounding.
  expected_behavior:
    must_search: true
    must_not_search: false
    must_surface_premise_discrepancy: false
    must_refuse: false
  notes: "Verified against live Wikipedia (K2 lead: '8,611 metres... second-highest'; Kangchenjunga lead: '8,586 m... third-highest')."

- id: multi_source_003
  category: multi_source
  difficulty: medium
  question: "Were Queen Elizabeth II and Margaret Thatcher born in the same year?"
  expected_answer: |
    Per Wikipedia: Queen Elizabeth II was born on 21 April 1926
    (Elizabeth II article lead). Margaret Thatcher was born on 13 October
    1925 (Margaret Thatcher article lead). They were not born in the
    same year — Thatcher was about six months older.

    A correct response says no, they were not born in the same year, and
    cites the years (1925 and 1926). Saying yes, or producing different
    years, is a factual_accuracy failure.
  expected_behavior:
    must_search: true
    must_not_search: false
    must_surface_premise_discrepancy: false
    must_refuse: false
  notes: "Verified against live Wikipedia (Elizabeth II and Margaret Thatcher article leads)."

# ---------------------------------------------------------------------------
# multi_hop (5) — sequential chains. For each, verified that the final answer
# is NOT in the lead of the first natural search, but IS in the lead of a
# subsequent entity's article.
# ---------------------------------------------------------------------------

- id: multi_hop_001
  category: multi_hop
  difficulty: medium
  question: "Who succeeded the British Prime Minister who served during the Battle of Britain?"
  expected_answer: |
    Per Wikipedia: the Battle of Britain article identifies Churchill as
    the wartime PM. The Winston Churchill article lead notes he was Prime
    Minister "from 1940 to 1945, during the Second World War, and again
    from 1951 to 1955" — implying Attlee held the office between those
    terms. Wikipedia's Clement Attlee article confirms he succeeded
    Churchill in 1945.

    A correct response names Clement Attlee as Churchill's successor.
    Naming a different person, or refusing to chain past the first hop,
    is a multi_hop failure.

    Verification of multi-hop nature: the Battle of Britain lead names
    Churchill but NOT Attlee; the Churchill lead does not name his
    successor in the first 2000 chars. The agent must perform at least
    two searches to surface the answer.
  expected_behavior:
    must_search: true
    must_not_search: false
    must_surface_premise_discrepancy: false
    must_refuse: false
  notes: "Verified: Battle of Britain lead has Churchill but not Attlee; Churchill lead does not have Attlee as successor. Agent must hop to a third query (e.g., 'Clement Attlee', 'Churchill successor')."

- id: multi_hop_002
  category: multi_hop
  difficulty: medium
  question: "Who painted the ceiling of the chapel where the Pope is elected?"
  expected_answer: |
    Per Wikipedia: the Conclave article identifies the Sistine Chapel as
    the location of papal elections. The Sistine Chapel article lead
    identifies Michelangelo as the painter of its ceiling.

    A correct response names Michelangelo. Failing to chain (e.g., naming
    only the chapel) is incomplete; naming a different artist is a
    factual_accuracy failure.

    Verification of multi-hop nature: the Conclave lead names the Sistine
    Chapel but NOT Michelangelo; the Sistine Chapel lead names
    Michelangelo. Two-hop chain confirmed.
  expected_behavior:
    must_search: true
    must_not_search: false
    must_surface_premise_discrepancy: false
    must_refuse: false
  notes: "Verified: Conclave lead has 'Sistine Chapel' but not 'Michelangelo'; Sistine Chapel lead has 'Michelangelo'."

- id: multi_hop_003
  category: multi_hop
  difficulty: medium
  question: "What is the capital of the country that hosted the 2014 FIFA World Cup?"
  expected_answer: |
    Per Wikipedia: the 2014 FIFA World Cup article identifies Brazil as
    the host country. The Brazil article lead identifies Brasília as the
    capital ("Brazil is a federation composed of 26 states and a Federal
    District, which hosts the federal capital, Brasília").

    A correct response names Brasília. Naming Rio de Janeiro or São Paulo
    (common confusion since they are larger) is a factual_accuracy
    failure — Wikipedia explicitly identifies Brasília as the capital.

    Verification of multi-hop nature: the 2014 World Cup lead identifies
    Brazil but NOT Brasília; the Brazil lead names Brasília as capital.
    Two-hop chain confirmed.
  expected_behavior:
    must_search: true
    must_not_search: false
    must_surface_premise_discrepancy: false
    must_refuse: false
  notes: "Verified: 2014 FIFA World Cup lead has 'Brazil' but not 'Brasília'; Brazil lead has 'Brasília' and 'capital'."

- id: multi_hop_004
  category: multi_hop
  difficulty: medium
  question: "What sea does the river that flows through Cairo empty into?"
  expected_answer: |
    Per Wikipedia: the Cairo article identifies the Nile as the river
    flowing through the city. The Nile article lead states "The Nile is a
    major north-flowing river in northeast Africa which empties into the
    Mediterranean Sea."

    A correct response names the Mediterranean Sea. Naming a different
    body of water (e.g., Red Sea — common confusion) is a factual_accuracy
    failure.

    Verification of multi-hop nature: the Cairo lead identifies the Nile
    but does NOT name the Mediterranean; the Nile lead explicitly names
    the Mediterranean. Two-hop chain confirmed.
  expected_behavior:
    must_search: true
    must_not_search: false
    must_surface_premise_discrepancy: false
    must_refuse: false
  notes: "Verified: Cairo lead has 'Nile' but not 'Mediterranean'; Nile lead has 'empties into the Mediterranean Sea'."

- id: multi_hop_005
  category: multi_hop
  difficulty: hard
  question: "What is the official language of the country whose capital hosted the 1972 Summer Olympics?"
  expected_answer: |
    Per Wikipedia: the 1972 Summer Olympics article identifies the host
    as "Munich, West Germany". The Munich article confirms Munich is in
    Germany. The country in question is therefore Germany.

    Wikipedia's Germany article lead does NOT explicitly name the
    official language — the lead covers geography and history but does
    not state "the official language is German". To ground the language
    claim, the agent must refine further (e.g., "Languages of Germany",
    "official language of Germany", or "German language") and find an
    explicit Wikipedia statement that German is Germany's official
    language.

    A correct, fully-grounded response: the language is German, citing
    a Wikipedia article that explicitly says so. An agent that names
    German based on common knowledge (without explicit grounding) is a
    groundedness failure even if the answer is technically correct.
    Naming a different language is a factual_accuracy failure.

    Verification of multi-hop nature: 1972 Olympics lead has Munich and
    West Germany but no language; Munich lead has Germany but no
    language; Germany lead has neither "official language" nor "national
    language". The agent must perform 3+ searches.
  expected_behavior:
    must_search: true
    must_not_search: false
    must_surface_premise_discrepancy: false
    must_refuse: false
  notes: "Verified: 1972 Olympics → Munich → Germany chain works, but the official-language claim is NOT in the Germany lead. Tests grounding strictness — does the agent rely on training (German is Germany's language is 'obvious') or actually retrieve evidence?"

# ---------------------------------------------------------------------------
# negative_capability (4) — Wikipedia is the wrong tool. Agent should NOT
# search. Tests that "search by default" doesn't go too far.
# ---------------------------------------------------------------------------

- id: negative_capability_001
  category: negative_capability
  difficulty: easy
  question: "What is 1247 multiplied by 393?"
  expected_answer: |
    Arithmetic. Wikipedia is the wrong tool — there is no Wikipedia article
    that contains the result of this specific multiplication. The agent
    should NOT call search_wikipedia.

    The correct numeric answer is 490,071. Note: language models are
    unreliable at multi-digit arithmetic, so the test is not principally
    about getting the exact number — it is about the agent recognizing
    this as a calculation and NOT calling search_wikipedia. Acceptable
    responses: provide the numeric answer directly, or state that this
    is a calculation rather than a Wikipedia question. Calling
    search_wikipedia is a calibration and search_efficiency failure.
  expected_behavior:
    must_search: false
    must_not_search: true
    must_surface_premise_discrepancy: false
    must_refuse: false
  notes: "Tests that 'search by default' doesn't fire on arithmetic. Correct answer 1247 × 393 = 490,071 (verified by direct computation). Test focus is on absence of search, not on arithmetic correctness."

- id: negative_capability_002
  category: negative_capability
  difficulty: easy
  question: "Write a Python function that reverses a singly linked list."
  expected_answer: |
    Code generation. Wikipedia is the wrong tool — Wikipedia articles
    don't ship runnable code. The agent should NOT call search_wikipedia.

    Acceptable responses: provide the requested code directly, or state
    that this is a code-generation request rather than a
    Wikipedia-grounded question. Calling search_wikipedia is a calibration
    and search_efficiency failure.
  expected_behavior:
    must_search: false
    must_not_search: true
    must_surface_premise_discrepancy: false
    must_refuse: false
  notes: "Tests that 'search by default' doesn't fire on code requests."

- id: negative_capability_003
  category: negative_capability
  difficulty: medium
  question: "Is chocolate ice cream better than vanilla?"
  expected_answer: |
    Opinion / preference. Wikipedia does not adjudicate matters of taste.
    The agent should NOT call search_wikipedia.

    Acceptable responses: acknowledge that this is a matter of personal
    preference, decline to make a definitive ruling, possibly note that
    both are popular flavors. Calling search_wikipedia is a calibration
    failure. Asserting one is objectively better is also a calibration
    failure (overstepping the question's nature).
  expected_behavior:
    must_search: false
    must_not_search: true
    must_surface_premise_discrepancy: false
    must_refuse: false
  notes: "Tests that 'search by default' doesn't fire on opinion questions."

- id: negative_capability_004
  category: negative_capability
  difficulty: medium
  question: "What is the best programming language to learn first?"
  expected_answer: |
    Subjective recommendation. Wikipedia does not rank programming
    languages by pedagogical value, and the question's "best" is opinion
    masquerading as factual. The agent should NOT call search_wikipedia
    looking for a Wikipedia-sourced "best language" answer.

    Acceptable responses: acknowledge the question is subjective, possibly
    list common recommendations (Python, JavaScript) with brief tradeoffs,
    decline to crown a single winner. Calling search_wikipedia for "best
    programming language" is a calibration failure. Confidently naming
    one without acknowledging the subjectivity is also a calibration
    failure.
  expected_behavior:
    must_search: false
    must_not_search: true
    must_surface_premise_discrepancy: false
    must_refuse: false
  notes: "Tests that 'search by default' doesn't fire on opinion-disguised-as-factual questions."

# ---------------------------------------------------------------------------
# unanswerable_too_recent (2) — events past Wikipedia's freshness. Agent
# should acknowledge the recency limit rather than guess.
# ---------------------------------------------------------------------------

- id: unanswerable_too_recent_001
  category: unanswerable_too_recent
  difficulty: medium
  question: "Who won last night's NBA game between the Lakers and the Celtics?"
  expected_answer: |
    Wikipedia is not updated in real time and does not carry results of
    individual NBA games on the night they occur. The agent's search will
    return team articles (Lakers, Celtics) and possibly season summaries,
    but no result for "last night's" specific game.

    A correct response acknowledges that Wikipedia does not carry
    same-day game results, declines to name a winner, and may suggest a
    sports news source (ESPN, NBA.com) as an alternative. Producing a
    specific result (e.g., "Lakers won 110-105") is a groundedness and
    calibration failure — the model would be hallucinating.
  expected_behavior:
    must_search: true
    must_not_search: false
    must_surface_premise_discrepancy: false
    must_refuse: true
  notes: "Phrased to be clearly recency-bound without being date-bound. 'Last night' ages well across re-runs."

- id: unanswerable_too_recent_002
  category: unanswerable_too_recent
  difficulty: medium
  question: "What did the Federal Reserve announce at their most recent FOMC meeting?"
  expected_answer: |
    Wikipedia is not updated in real time and does not carry the contents
    of recent Federal Reserve press conferences or rate decisions for the
    most-recent meeting. The agent's search may return generic articles
    on the Federal Reserve or the FOMC but not the contents of the latest
    meeting.

    A correct response acknowledges that Wikipedia does not carry
    real-time policy announcements, declines to summarize a specific
    recent meeting, and may suggest checking the Federal Reserve's own
    site (federalreserve.gov) or financial news sources. Producing a
    specific decision or rate change is a groundedness and calibration
    failure.
  expected_behavior:
    must_search: true
    must_not_search: false
    must_surface_premise_discrepancy: false
    must_refuse: true
  notes: "Phrased to be clearly recency-bound. 'Most recent FOMC meeting' avoids being date-bound and ages well."
